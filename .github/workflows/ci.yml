name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Build
        run: dotnet build Impetus.sln -c Release

      - name: Unit tests
        run: dotnet test tests/Impetus.Tests/Impetus.Tests.csproj -c Release

      - name: PicoGK smoke
        run: dotnet run --project src/Impetus -- smoke
